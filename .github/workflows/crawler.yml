name: TikTok Shop Crawler

on:
  # Chạy tự động theo lịch: mỗi ngày lúc 2:00 AM (UTC+7 = 19:00 UTC hôm trước)
  schedule:
    - cron: '0 19 * * *'

  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Cài dependencies từ requirements.txt
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 4. Cài Playwright + Chromium browser
      - name: Install Playwright & Chromium
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      # 5. Cài HuggingFace Hub để download model
      - name: Install HuggingFace Hub
        run: pip install huggingface_hub

      # 6. Download model captcha solver từ HuggingFace
      - name: Download captcha solver model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import hf_hub_download
          import shutil, os

          model_path = hf_hub_download(
              repo_id="Boo1901/anomaly-detection-tiktokshop",
              filename="solver_captcha_tiktokshop.pt",
              token=os.environ["HF_TOKEN"],
          )
          # Copy model về thư mục crawler
          dest = "app/crawler/solver_captcha_tiktokshop.pt"
          shutil.copy(model_path, dest)
          print(f"✅ Model downloaded to {dest}")
          EOF

      # 7. Khôi phục auth/state.json từ GitHub Secrets
      - name: Restore TikTok auth session
        env:
          TIKTOK_STATE_JSON: ${{ secrets.TIKTOK_STATE_JSON }}
        run: |
          mkdir -p auth
          echo "$TIKTOK_STATE_JSON" > auth/state.json
          echo "✅ auth/state.json restored"

      # 8. Tạo file .env từ GitHub Secrets
      - name: Create .env file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> .env
          echo "SUPABASE_KEY=$SUPABASE_KEY" >> .env
          echo "HEADLESS=true" >> .env
          echo "✅ .env created"

      # 9. Chạy crawler
      - name: Run TikTok crawler
        env:
          HEADLESS: "true"
        run: |
          python app/crawler/collect_data.py
