name: Review Pipeline

on:
  schedule:
    - cron: '0 * * * *' # Every 1 hour
  workflow_dispatch:

concurrency:
  group: pipeline-review
  cancel-in-progress: false

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Running Pipelines
        id: check_pipelines
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch in-progress and queued runs
          RUNS=$(gh api -X GET /repos/${{ github.repository }}/actions/runs -f status=in_progress)
          QUEUED=$(gh api -X GET /repos/${{ github.repository }}/actions/runs -f status=queued)
          
          # Count runs for "Products Pipeline" or "Timeseries Pipeline"
          COUNT_RUNNING=$(echo "$RUNS" | jq '[.workflow_runs[] | select(.name == "Products Pipeline" or .name == "Timeseries Pipeline")] | length')
          COUNT_QUEUED=$(echo "$QUEUED" | jq '[.workflow_runs[] | select(.name == "Products Pipeline" or .name == "Timeseries Pipeline")] | length')
          
          TOTAL=$((COUNT_RUNNING + COUNT_QUEUED))
          
          echo "Found $TOTAL competing pipeline(s) running or queued."
          if [ "$TOTAL" -gt 0 ]; then
            echo "Other pipelines are active. Exiting..."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check_pipelines.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check_pipelines.outputs.skip == 'false'
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Review Pipeline
        if: steps.check_pipelines.outputs.skip == 'false'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python pipeline/review.py
