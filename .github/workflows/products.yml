name: Products Pipeline

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch:

concurrency:
  group: pipeline-products
  cancel-in-progress: false

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Database Product Count
        id: check_count
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install supabase httpx
          COUNT=$(python -c "
import os, sys
from supabase import create_client
url = os.getenv('SUPABASE_URL')
key = os.getenv('SUPABASE_KEY')
if not url or not key:
    print('0')
    sys.exit(0)
try:
    s = create_client(url, key)
    resp = s.table('products').select('*', count='exact').limit(1).execute()
    print(resp.count if resp.count is not None else '0')
except Exception as e:
    print(f'Error: {e}', file=sys.stderr)
    print('0')
          ")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Current product count is: $COUNT"
          
          if [ "$COUNT" -ge 5000 ]; then
            echo "Reached 5000 products. Exiting..."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check_count.outputs.skip == 'false'
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Products Pipeline
        if: steps.check_count.outputs.skip == 'false'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python pipeline/products.py
